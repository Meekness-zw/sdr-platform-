services:
  - type: web
    name: sdr-platform
    env: python
    pythonVersion: 3.11.9
    plan: free
    region: oregon
    buildCommand: CARGO_HOME=/tmp/.cargo pip install -r requirements.txt
    startCommand: gunicorn webhooks.server:app -k uvicorn.workers.UvicornWorker
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
